name: Build SCPO Login Test

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install playwright pillow pyinstaller

      - name: Instalar Chromium bundled
        env:
          PLAYWRIGHT_BROWSERS_PATH: "0"
        run: |
          python -m playwright install chromium
          python -c "
          import os, sys
          from pathlib import Path
          sp = Path(sys.prefix) / 'Lib' / 'site-packages'
          browsers = sp / 'playwright' / 'driver' / 'package' / '.local-browsers'
          print('Browsers path:', browsers)
          print('Exists:', browsers.exists())
          if browsers.exists():
              for item in browsers.iterdir():
                  print(' -', item.name)
          "

      - name: Build EXE
        env:
          PLAYWRIGHT_BROWSERS_PATH: "0"
        run: >
          python -m PyInstaller --onedir --windowed
          --name "SCPO_LoginTest"
          --collect-all playwright
          --hidden-import PIL._imaging
          --hidden-import PIL.Image
          --hidden-import PIL.ImageTk
          --noupx
          scpo_app.py

      - name: Verificar Chromium no dist
        run: |
          python -c "
          from pathlib import Path
          dist = Path('dist/SCPO_LoginTest/_internal/playwright/driver/package/.local-browsers')
          print('Chromium no dist:', dist.exists())
          if dist.exists():
              for item in dist.iterdir():
                  print(' -', item.name)
          "

      - uses: actions/upload-artifact@v4
        with:
          name: SCPO_LoginTest-Windows
          path: dist/SCPO_LoginTest/
          retention-days: 30
