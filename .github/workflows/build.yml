name: Build SCPO Login Test

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install playwright pillow pyinstaller

      - name: Instalar Chromium bundled
        env:
          PLAYWRIGHT_BROWSERS_PATH: "0"
        run: python -m playwright install chromium

      - name: Build EXE
        env:
          PLAYWRIGHT_BROWSERS_PATH: "0"
        shell: pwsh
        run: |
          # Localiza pasta do Chromium instalado
          $browsers = "$env:pythonLocation\Lib\site-packages\playwright\driver\package\.local-browsers"
          Write-Host "Browsers path: $browsers"
          Write-Host "Contents:"
          Get-ChildItem $browsers | ForEach-Object { Write-Host " - $($_.Name)" }

          # Monta o --add-data para incluir os binários do Chromium
          $addData = "$browsers;playwright/driver/package/.local-browsers"

          python -m PyInstaller --onedir --windowed `
            --name "SCPO_LoginTest" `
            --collect-all playwright `
            --add-data "$addData" `
            --hidden-import PIL._imaging `
            --hidden-import PIL.Image `
            --hidden-import PIL.ImageTk `
            --noupx `
            scpo_app.py

      - name: Verificar Chromium no dist
        shell: pwsh
        run: |
          $dist = "dist\SCPO_LoginTest\_internal\playwright\driver\package\.local-browsers"
          Write-Host "Chromium no dist existe: $(Test-Path $dist)"
          if (Test-Path $dist) {
            Get-ChildItem $dist | ForEach-Object { Write-Host " - $($_.Name)" }
          }

      - uses: actions/upload-artifact@v4
        with:
          name: SCPO_LoginTest-Windows
          path: dist/SCPO_LoginTest/
          retention-days: 30
