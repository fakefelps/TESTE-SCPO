name: Gerar EXE - SCPO Automation

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install selenium python-dateutil pyinstaller

      - name: Gerar EXE
        run: >
          python -m PyInstaller --onefile --windowed
          --name "SCPO_Automation"
          --collect-all selenium
          --hidden-import selenium.webdriver.edge.options
          --hidden-import selenium.webdriver.edge.service
          --hidden-import selenium.webdriver.support.ui
          --hidden-import selenium.webdriver.support.expected_conditions
          --hidden-import dateutil.relativedelta
          scpo_app.py

      - uses: actions/upload-artifact@v4
        with:
          name: SCPO_Automation-Windows
          path: dist/SCPO_Automation.exe
          retention-days: 30
