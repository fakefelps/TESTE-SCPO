name: Build SCPO Login Test

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install playwright pillow pyinstaller

      - name: Build EXE
        run: >
          python -m PyInstaller --onedir --windowed
          --name "SCPO_LoginTest"
          --collect-all playwright
          --hidden-import PIL._imaging
          --hidden-import PIL.Image
          --hidden-import PIL.ImageTk
          --noupx
          scpo_app.py

      - uses: actions/upload-artifact@v4
        with:
          name: SCPO_LoginTest-Windows
          path: dist/SCPO_LoginTest/
          retention-days: 30
